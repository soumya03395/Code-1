<!DOCTYPE html>
<html>
<head>

<title>Adya LinkedIn Insights</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:40px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
flex:1;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}

input{
padding:10px;
margin-top:15px;
width:300px;
}

canvas{
background:white;
border-radius:10px;
padding:10px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>Adya LinkedIn Insights</h1>

<div class="cards">

<div class="card">
<h3>Total Mentions</h3>
<p id="totalMentions">0</p>
</div>

<div class="card">
<h3>Unique Authors</h3>
<p id="authors">0</p>
</div>

<div class="card">
<h3>Average Engagement</h3>
<p id="engagement">0</p>
</div>

</div>

<h2>Mentions Over Time</h2>
<canvas id="mentionsChart"></canvas>

<h2>Mentions Explorer</h2>

<input id="search" placeholder="Search posts">

<table>

<thead>
<tr>
<th>Author</th>
<th>Post</th>
<th>Date</th>
<th>Likes</th>
<th>Comments</th>
<th>Link</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTRD3B_hSW8TiMA2DuvLjYdVJx552K9Qi6uFXXkAzO4qwKgGwtrCkzSg2iaL5h1gq9Y9Nm166-cDOOY/pub?output=csv";

let globalData=[];

Papa.parse(sheetURL,{

download:true,
header:true,

complete:function(results){

let rows = results.data.filter(r => Object.values(r).some(v=>v))

console.log("HEADERS:",Object.keys(rows[0]))

globalData=rows

processData(rows)
renderTable(rows)

}

})

function detect(row,keys){

for(let k of keys){

if(row[k]!==undefined) return row[k]

}

return ""

}

function processData(data){

let authors=new Set()
let engagement=0
let mentionsByDate={}

data.forEach(row=>{

let author=detect(row,["author","Author"])
let date=detect(row,["postedAt","date","Date"])
let likes=Number(detect(row,["likes","reactions","Likes"]))||0
let comments=Number(detect(row,["comments","Comments"]))||0

if(author) authors.add(author)

engagement+=likes+comments

mentionsByDate[date]=(mentionsByDate[date]||0)+1

})

document.getElementById("totalMentions").innerText=data.length
document.getElementById("authors").innerText=authors.size
document.getElementById("engagement").innerText=Math.round(engagement/data.length)

renderChart(mentionsByDate)

}

function renderChart(data){

new Chart(document.getElementById("mentionsChart"),{

type:"line",

data:{
labels:Object.keys(data),
datasets:[{
label:"Mentions",
data:Object.values(data)
}]
}

})

}

function renderTable(data){

let tbody=document.getElementById("tableBody")
tbody.innerHTML=""

data.forEach(row=>{

let author=detect(row,["author","Author"])
let text=detect(row,["text","postText","content"])
let date=detect(row,["postedAt","date","Date"])
let likes=detect(row,["likes","reactions"])
let comments=detect(row,["comments"])
let link=detect(row,["linkedinUrl","url"])

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${author}</td>
<td>${text?text.substring(0,120):""}</td>
<td>${date}</td>
<td>${likes}</td>
<td>${comments}</td>
<td><a href="${link}" target="_blank">View</a></td>
`

tbody.appendChild(tr)

})

}

document.getElementById("search").addEventListener("input",function(){

let q=this.value.toLowerCase()

let filtered=globalData.filter(r =>
JSON.stringify(r).toLowerCase().includes(q)
)

renderTable(filtered)

})

</script>

</body>

</html>
