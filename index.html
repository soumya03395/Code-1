<!DOCTYPE html>
<html>
<head>

<title>Adya LinkedIn Insights</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:40px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
flex:1;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}

input{
padding:10px;
margin-top:15px;
width:300px;
}

canvas{
background:white;
border-radius:10px;
padding:10px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>Adya LinkedIn Insights</h1>

<div class="cards">

<div class="card">
<h3>Total Mentions</h3>
<p id="totalMentions">0</p>
</div>

<div class="card">
<h3>Unique Authors</h3>
<p id="authors">0</p>
</div>

<div class="card">
<h3>Average Engagement</h3>
<p id="engagement">0</p>
</div>

</div>

<h2>Mentions Over Time</h2>
<canvas id="mentionsChart"></canvas>

<h2>Mentions Explorer</h2>

<input id="search" placeholder="Search posts">

<table>

<thead>
<tr>
<th>Author</th>
<th>Post</th>
<th>Date</th>
<th>Likes</th>
<th>Comments</th>
<th>Link</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTRD3B_hSW8TiMA2DuvLjYdVJx552K9Qi6uFXXkAzO4qwKgGwtrCkzSg2iaL5h1gq9Y9Nm166-cDOOY/pub?output=csv";

let globalData=[];

Papa.parse(sheetURL,{
download:true,
header:true,
skipEmptyLines:true,

complete:function(results){

let data = results.data.filter(r => r.author)

globalData=data

calculateMetrics(data)
renderTable(data)

}

})

function calculateMetrics(data){

let authors = new Set()
let totalEngagement = 0
let mentionsByDate = {}

data.forEach(row=>{

let author = row.author
let date = row.postedAt

let likes = Number(row.likes) || 0
let comments = Number(row.comments) || 0

authors.add(author)

totalEngagement += likes + comments

if(date){

mentionsByDate[date] = (mentionsByDate[date] || 0) + 1

}

})

document.getElementById("totalMentions").innerText = data.length
document.getElementById("authors").innerText = authors.size

let avgEngagement = data.length ? Math.round(totalEngagement/data.length) : 0

document.getElementById("engagement").innerText = avgEngagement

renderChart(mentionsByDate)

}

function renderChart(data){

new Chart(document.getElementById("mentionsChart"),{

type:"line",

data:{
labels:Object.keys(data),
datasets:[{
label:"Mentions",
data:Object.values(data),
borderColor:"#38bdf8",
backgroundColor:"rgba(56,189,248,0.2)",
tension:0.3
}]
}

})

}

function renderTable(data){

let tbody=document.getElementById("tableBody")
tbody.innerHTML=""

data.forEach(row=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${row.author}</td>
<td>${row.text ? row.text.substring(0,120) : ""}</td>
<td>${row.postedAt}</td>
<td>${row.likes || 0}</td>
<td>${row.comments || 0}</td>
<td><a href="${row.linkedinUrl}" target="_blank">View</a></td>
`

tbody.appendChild(tr)

})

}

document.getElementById("search").addEventListener("input",function(){

let q=this.value.toLowerCase()

let filtered=globalData.filter(r =>
JSON.stringify(r).toLowerCase().includes(q)
)

renderTable(filtered)

})

</script>
</body>

</html>
