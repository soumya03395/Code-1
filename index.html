<!DOCTYPE html>
<html>
<head>
<title>Adya LinkedIn Insights</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
}

.sidebar{
width:220px;
height:100vh;
background:#020617;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#38bdf8;
}

.sidebar a{
display:block;
color:white;
margin:15px 0;
text-decoration:none;
}

.main{
margin-left:240px;
padding:30px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
flex:1;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
}

canvas{
background:white;
border-radius:10px;
padding:10px;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>Adya Insights</h2>
<a href="#">Dashboard</a>
<a href="#">Mentions Explorer</a>
</div>

<div class="main">

<h1>LinkedIn Mentions Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Mentions</h3>
<p id="totalMentions">-</p>
</div>

<div class="card">
<h3>Mentions Last 30 Days</h3>
<p id="mentions30">-</p>
</div>

<div class="card">
<h3>Unique Authors</h3>
<p id="authors">-</p>
</div>

<div class="card">
<h3>Avg Engagement</h3>
<p id="engagement">-</p>
</div>

</div>

<h2>Mentions Over Time</h2>
<canvas id="mentionsChart"></canvas>

<h2>Authors Mentioning Adya AI</h2>
<canvas id="authorChart"></canvas>

<h2>Mentions Explorer</h2>

<input id="search" placeholder="Search posts..." style="padding:10px;width:300px">

<table id="postsTable">
<thead>
<tr>
<th>Author</th>
<th>Post</th>
<th>Date</th>
<th>Likes</th>
<th>Comments</th>
<th>Link</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

const sheetURL =
https://docs.google.com/spreadsheets/d/e/2PACX-1vTRD3B_hSW8TiMA2DuvLjYdVJx552K9Qi6uFXXkAzO4qwKgGwtrCkzSg2iaL5h1gq9Y9Nm166-cDOOY/pubhtml
Papa.parse(sheetURL,{

download:true,
header:true,

complete:function(results){

let data = results.data

let totalMentions = data.length
let authors = new Set()
let totalEngagement = 0

let mentionsByDate={}
let authorCount={}

data.forEach(row=>{

authors.add(row.Author)

let likes = Number(row.Likes)||0
let comments = Number(row.Comments)||0

totalEngagement += likes + comments

let date = row.Date

mentionsByDate[date]=(mentionsByDate[date]||0)+1
authorCount[row.Author]=(authorCount[row.Author]||0)+1

})

document.getElementById("totalMentions").innerText = totalMentions
document.getElementById("authors").innerText = authors.size
document.getElementById("engagement").innerText =
Math.round(totalEngagement/totalMentions)

renderCharts(mentionsByDate,authorCount)

renderTable(data)

}

})

function renderCharts(mentions,authors){

new Chart(document.getElementById("mentionsChart"),{

type:"line",

data:{
labels:Object.keys(mentions),
datasets:[{
label:"Mentions",
data:Object.values(mentions)
}]
}

})

new Chart(document.getElementById("authorChart"),{

type:"bar",

data:{
labels:Object.keys(authors),
datasets:[{
label:"Posts",
data:Object.values(authors)
}]
}

})

}

function renderTable(data){

const tbody = document.querySelector("#postsTable tbody")

data.forEach(row=>{

let tr = document.createElement("tr")

tr.innerHTML=`
<td>${row.Author}</td>
<td>${row.Post_text.substring(0,80)}...</td>
<td>${row.Date}</td>
<td>${row.Likes}</td>
<td>${row.Comments}</td>
<td><a href="${row.Post_URL}" target="_blank">View</a></td>
`

tbody.appendChild(tr)

})

}

</script>

</body>
</html>
