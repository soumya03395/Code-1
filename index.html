<!DOCTYPE html>
<html>
<head>

<title>Adya LinkedIn Insights</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
}

.main{
padding:40px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
flex:1;
min-width:200px;
}

h1,h2{
margin-top:0;
}

canvas{
background:white;
border-radius:10px;
padding:10px;
margin-top:20px;
}

input{
padding:10px;
width:300px;
margin-top:20px;
border-radius:6px;
border:none;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:#020617;
}

th,td{
padding:12px;
border-bottom:1px solid #334155;
}

th{
text-align:left;
background:#020617;
}

a{
color:#38bdf8;
}

</style>

</head>

<body>

<div class="main">

<h1>Adya LinkedIn Insights</h1>

<div class="cards">

<div class="card">
<h3>Total Mentions</h3>
<p id="totalMentions">0</p>
</div>

<div class="card">
<h3>Unique Authors</h3>
<p id="authors">0</p>
</div>

<div class="card">
<h3>Average Engagement</h3>
<p id="engagement">0</p>
</div>

</div>

<h2>Mentions Over Time</h2>

<canvas id="mentionsChart"></canvas>

<h2>Mentions Explorer</h2>

<input id="searchInput" placeholder="Search posts or authors">

<table>

<thead>

<tr>
<th>Author</th>
<th>Post</th>
<th>Date</th>
<th>Likes</th>
<th>Comments</th>
<th>Link</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTRD3B_hSW8TiMA2DuvLjYdVJx552K9Qi6uFXXkAzO4qwKgGwtrCkzSg2iaL5h1gq9Y9Nm166-cDOOY/pub?output=csv"

let globalData = []

Papa.parse(sheetURL,{
download:true,
header:true,

complete:function(results){

let data = results.data.filter(row => Object.values(row).some(v => v))

globalData = data

processData(data)
renderTable(data)

}

})

function processData(data){

let authors = new Set()
let engagement = 0
let mentionsByDate = {}

data.forEach(row=>{

let author = row.author || ""
let date = row.postedAt || ""

let likes = Number(row.likes || 0)
let comments = Number(row.comments || 0)

authors.add(author)

engagement += likes + comments

mentionsByDate[date] = (mentionsByDate[date] || 0) + 1

})

document.getElementById("totalMentions").innerText = data.length
document.getElementById("authors").innerText = authors.size

document.getElementById("engagement").innerText =
Math.round(engagement / data.length)

renderChart(mentionsByDate)

}

function renderChart(mentions){

new Chart(document.getElementById("mentionsChart"),{

type:"line",

data:{
labels:Object.keys(mentions),

datasets:[{
label:"Mentions",
data:Object.values(mentions)
}]

}

})

}

function renderTable(data){

let tbody = document.getElementById("tableBody")
tbody.innerHTML = ""

data.forEach(row=>{

let author = row.author || ""
let text = row.text || row.postText || row.content || ""
let date = row.postedAt || ""
let likes = row.likes || 0
let comments = row.comments || 0
let link = row.linkedinUrl || "#"

let tr = document.createElement("tr")

tr.innerHTML = `
<td>${author}</td>
<td>${text.substring(0,120)}</td>
<td>${date}</td>
<td>${likes}</td>
<td>${comments}</td>
<td><a href="${link}" target="_blank">View</a></td>
`

tbody.appendChild(tr)

})

}

document.getElementById("searchInput").addEventListener("input",function(){

let keyword = this.value.toLowerCase()

let filtered = globalData.filter(row =>

JSON.stringify(row).toLowerCase().includes(keyword)

)

renderTable(filtered)

})

</script>

</body>
</html>
