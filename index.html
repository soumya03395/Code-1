<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTRD3B_hSW8TiMA2DuvLjYdVJx552K9Qi6uFXXkAzO4qwKgGwtrCkzSg2iaL5h1gq9Y9Nm166-cDOOY/pub?output=csv";

let globalData=[];

Papa.parse(sheetURL,{

download:true,
header:true,
skipEmptyLines:true,

complete:function(results){

let rows = results.data.filter(r => Object.values(r).some(v => v && v !== ""))

console.log("Detected Headers:",Object.keys(rows[0]))

globalData = rows

processData(rows)
renderTable(rows)

}

})

function detect(row,keys){

for(let k of keys){

if(row[k] !== undefined && row[k] !== "") return row[k]

}

return ""

}

function processData(data){

if(data.length === 0) return

let authors = new Set()
let engagement = 0
let mentionsByDate = {}

data.forEach(row=>{

let author = detect(row,["author","Author","name"])
let date = detect(row,["postedAt","date","Date","createdAt"])

let likes = Number(detect(row,["likes","reactions","Likes"])) || 0
let comments = Number(detect(row,["comments","Comments"])) || 0

if(author) authors.add(author)

engagement += likes + comments

if(date){
mentionsByDate[date] = (mentionsByDate[date] || 0) + 1
}

})

document.getElementById("totalMentions").innerText = data.length
document.getElementById("authors").innerText = authors.size

let avg = data.length ? Math.round(engagement/data.length) : 0

document.getElementById("engagement").innerText = avg

renderChart(mentionsByDate)

}

function renderChart(data){

new Chart(document.getElementById("mentionsChart"),{

type:"line",

data:{
labels:Object.keys(data),
datasets:[{
label:"Mentions",
data:Object.values(data),
borderColor:"#38bdf8",
tension:0.3
}]
}

})

}

function renderTable(data){

let tbody = document.getElementById("tableBody")
tbody.innerHTML=""

data.forEach(row=>{

let author = detect(row,["author","Author"])
let text = detect(row,["text","postText","content","Post"])
let date = detect(row,["postedAt","date","Date"])
let likes = detect(row,["likes","reactions"]) || 0
let comments = detect(row,["comments"]) || 0
let link = detect(row,["linkedinUrl","url","postUrl"])

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${author}</td>
<td>${text ? text.substring(0,120) : ""}</td>
<td>${date}</td>
<td>${likes}</td>
<td>${comments}</td>
<td>${link ? `<a href="${link}" target="_blank">View</a>` : ""}</td>
`

tbody.appendChild(tr)

})

}

document.getElementById("search").addEventListener("input",function(){

let q=this.value.toLowerCase()

let filtered = globalData.filter(r =>
JSON.stringify(r).toLowerCase().includes(q)
)

renderTable(filtered)

})

</script>
